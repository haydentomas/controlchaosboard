<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C&C Board</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #e8dcc8;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      padding: 20px;
      min-height: 100vh;

      box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 0 80px rgba(0,0,0,0.9);
      border: 15px rgb(101, 102, 93) solid;
      
    }

   

    .board {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 4px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      text-align: center;
      padding: 20px;
      border-bottom: 2px solid #4a4a4a;
    }

    .title {
      font-size: 2.5em;
      font-weight: bold;
      letter-spacing: 2px;
      color: #f0e8cc;
      text-transform: uppercase;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .column {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .column h2 {
      font-size: 1.8em;
      color: #f0e8cc;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 2px solid #4a4a4a;
      padding-bottom: 10px;
    }

    ol {
      list-style: decimal;
      padding-left: 30px;
      font-size: 1.1em;
      line-height: 1.6;
    }

    li {
      margin-bottom: 8px;
      color: #e8dcc8;
    }

    .empty {
      color: #707070;
      font-style: italic;
    }

    .footer {
      text-align: center;
      border-top: 2px solid #4a4a4a;
      padding-top: 15px;
      font-size: 0.9em;
      color: #b8a890;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .event-badge {
      background: linear-gradient(135deg, #ffd700, #ffa500);
      color: #000;
      font-weight: bold;
      text-align: center;
      padding: 10px;
      border-radius: 4px;
      font-size: 1.25em;
      margin-top: 15px;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
      animation: pulse 2s infinite;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
      50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.8); }
      100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
    }

    .stats-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 10px 0;
    }
    .stats-section {
      border: 2px solid #4a4a4a;
      background: rgba(255,255,255,0.02);
      padding: 15px;
      border-radius: 6px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }
    .stats-section h3 {
      margin: 0 0 12px 0;
      color: #f0e8cc;
      text-transform: uppercase;
      font-size: 1.25em;
      border-bottom: 2px solid #4a4a4a;
      padding-bottom: 6px;
      letter-spacing: 1px;
    }
    .stat-line {
      font-size: 1.15em;
      margin-bottom: 8px;
      color: #e8dcc8;
    }
    .stat-line:last-child {
      margin-bottom: 0;
    }
    .stat-key {
      font-weight: bold;
      color: #b8a890;
    }
    .stat-val {
      color: #f0e8cc;
      text-shadow: 0 0 5px rgba(240, 232, 204, 0.2);
    }
    .text-active {
      color: #9cdb9c !important;
      text-shadow: 0 0 8px rgba(156, 219, 156, 0.4);
    }
  </style>
</head>
<body>
  <div class="outer-trim">
    <div class="board">
      <div class="container">
        <div class="header">
          <div class="title" id="title">Control & Chaos Leaderboard</div>
          <div id="eventBadge" class="event-badge" style="display: none;"></div>
        </div>

        <div class="columns">
          <div class="column">
            <h2>Top Doms</h2>
            <ol id="domList"></ol>
          </div>
          <div class="column">
            <h2>Top Subs</h2>
            <ol id="subList"></ol>
          </div>
        </div>

        <div id="statsContainer" class="stats-container" style="display: none;"></div>

        <div class="footer">
          <span id="shown">Shown D:0/0 S:0/0</span>
          <span id="updated">Upd: --:-- -- SLT</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function getParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name) || "";
    }

    function parseBoard(text) {
      const badgeEl = document.getElementById('eventBadge');
      if (badgeEl) {
        badgeEl.style.display = 'none';
      }

      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const doms = [];
      const subs = [];
      let section = '';

      for (const line of lines) {
        const upper = line.toUpperCase();

        if (upper.includes('COIN HUNT:') || upper.includes('RELIC:') || upper.includes('THRONE:') || upper.includes('CAGE:')) {
          if (badgeEl) {
            badgeEl.textContent = line;
            badgeEl.style.display = 'block';
          }
          continue;
        }

        if (upper.includes('[C&C]') || upper.includes('DOMS VS SUBS')) {
          // Keep the static title defined in the HTML
          continue;
        }

        if (upper === 'DOMS') {
          section = 'dom';
          continue;
        }

        if (upper === 'SUBS') {
          section = 'sub';
          continue;
        }

        if (upper.includes('SHOWN D:')) {
          document.getElementById('shown').textContent = line;
          continue;
        }

        if (upper.includes('UPD:')) {
          document.getElementById('updated').textContent = line;
          continue;
        }

        if (/^\d+\.\s+/.test(line) && line.includes('| L') && line.includes('XP')) {
          const clean = line.replace(/^\d+\.\s+/, '');
          if (section === 'dom') doms.push(clean);
          else if (section === 'sub') subs.push(clean);
        }
      }

      return { doms, subs };
    }

    function parseStats(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      let html = "";
      let currentSection = null;

      for (const line of lines) {
        if (line.startsWith("==") || line.startsWith("--")) {
          continue;
        }
        if (line.includes("UPD:") || line.includes("UPDATED:")) {
          document.getElementById('updated').textContent = line;
          continue;
        }
        if (line === "[Control and Chaos]" || line === "GAME STATS") {
          continue;
        }
        
        if (line === line.toUpperCase() && !line.includes(":") && !/\d/.test(line)) {
          if (currentSection) {
            html += "</div>";
          }
          html += `<div class="stats-section"><h3>${line}</h3>`;
          currentSection = line;
        } else {
          if (!currentSection) {
            html += `<div class="stats-section">`;
            currentSection = "INFO";
          }
          let content = line;
          if (line.includes(":")) {
            const parts = line.split(":");
            const key = parts[0].trim();
            const val = parts.slice(1).join(":").trim();
            
            let valClass = "stat-val";
            if (val.startsWith("Active") || val.startsWith("Live") || (val !== "Inactive" && val !== "None" && (key === "Coin Hunt" || key === "Relic Carry" || key === "Throne Command" || key === "Cage Break"))) {
              valClass += " text-active";
            }
            content = `<span class="stat-key">${key}:</span> <span class="${valClass}">${val}</span>`;
          }
          html += `<div class="stat-line">${content}</div>`;
        }
      }
      if (currentSection) {
        html += "</div>";
      }
      return html;
    }

    function render(id, items) {
      const el = document.getElementById(id);
      el.innerHTML = '';

      if (items.length === 0) {
        const li = document.createElement('li');
        li.className = 'empty';
        li.textContent = 'No entries';
        el.appendChild(li);
        return;
      }

      for (const item of items) {
        const li = document.createElement('li');
        li.textContent = item;
        el.appendChild(li);
      }
    }

    const raw = getParam('t');
    const text = raw ? decodeURIComponent(raw) : '';
    const mode = getParam('m');

    if (mode === 'stats') {
      document.getElementById('title').textContent = "Control & Chaos Game Stats";
      document.querySelector('.columns').style.display = 'none';
      document.getElementById('shown').style.display = 'none';
      const container = document.getElementById('statsContainer');
      container.innerHTML = parseStats(text);
      container.style.display = 'flex';
    } else {
      const data = parseBoard(text);
      render('domList', data.doms.slice(0, 10));
      render('subList', data.subs.slice(0, 10));
    }
  </script>
</body>
</html>
