<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C&C Board</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #e8dcc8;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      padding: 20px;
      min-height: 100vh;

      box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 0 80px rgba(0,0,0,0.9);
      border: 15px rgb(101, 102, 93) solid;
      
    }

   

    .board {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 4px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      text-align: center;
      padding: 20px;
      border-bottom: 2px solid #4a4a4a;
    }

    .title {
      font-size: 2.5em;
      font-weight: bold;
      letter-spacing: 2px;
      color: #f0e8cc;
      text-transform: uppercase;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .column {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .column h2 {
      font-size: 1.8em;
      color: #f0e8cc;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 2px solid #4a4a4a;
      padding-bottom: 10px;
    }

    ol {
      list-style: decimal;
      padding-left: 30px;
      font-size: 1.1em;
      line-height: 1.6;
    }

    li {
      margin-bottom: 8px;
      color: #e8dcc8;
    }

    .empty {
      color: #707070;
      font-style: italic;
    }

    .footer {
      text-align: center;
      border-top: 2px solid #4a4a4a;
      padding-top: 15px;
      font-size: 0.9em;
      color: #b8a890;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="outer-trim">
    <div class="board">
      <div class="container">
        <div class="header">
          <div class="title" id="title">[C&C] DOMS vs SUBS</div>
        </div>

        <div class="columns">
          <div class="column">
            <h2>Top Doms</h2>
            <ol id="domList"></ol>
          </div>
          <div class="column">
            <h2>Top Subs</h2>
            <ol id="subList"></ol>
          </div>
        </div>

        <div class="footer">
          <span id="shown">Shown D:0/0 S:0/0</span>
          <span id="updated">Upd: --:-- -- SLT</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function getParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name) || "";
    }

    function parseBoard(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const doms = [];
      const subs = [];
      let section = '';

      for (const line of lines) {
        const upper = line.toUpperCase();

        if (upper.includes('[C&C]') || upper.includes('DOMS VS SUBS')) {
          document.getElementById('title').textContent = line;
          continue;
        }

        if (upper === 'DOMS') {
          section = 'dom';
          continue;
        }

        if (upper === 'SUBS') {
          section = 'sub';
          continue;
        }

        if (upper.includes('SHOWN D:')) {
          document.getElementById('shown').textContent = line;
          continue;
        }

        if (upper.includes('UPD:')) {
          document.getElementById('updated').textContent = line;
          continue;
        }

        if (/^\d+\.\s+/.test(line) && line.includes('| L') && line.includes('XP')) {
          const clean = line.replace(/^\d+\.\s+/, '');
          if (section === 'dom') doms.push(clean);
          else if (section === 'sub') subs.push(clean);
        }
      }

      return { doms, subs };
    }

    function render(id, items) {
      const el = document.getElementById(id);
      el.innerHTML = '';

      if (items.length === 0) {
        const li = document.createElement('li');
        li.className = 'empty';
        li.textContent = 'No entries';
        el.appendChild(li);
        return;
      }

      for (const item of items) {
        const li = document.createElement('li');
        li.textContent = item;
        el.appendChild(li);
      }
    }

    const raw = getParam('t');
    const text = raw ? decodeURIComponent(raw) : '';
    const data = parseBoard(text);

    render('domList', data.doms.slice(0, 10));
    render('subList', data.subs.slice(0, 10));
  </script>
</body>
</html>
